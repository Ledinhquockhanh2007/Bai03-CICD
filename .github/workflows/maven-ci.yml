name: Java CI/CD with Maven

# Trigger khi có push hoặc pull_request vào nhánh main
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Chạy trên máy ảo Linux của GitHub

    steps:
    - name: Lấy mã nguồn từ kho chứa (Checkout code)
      uses: actions/checkout@v4

    - name: Cài đặt môi trường Java 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven # Cache thư viện để build nhanh hơn ở các lần sau

    - name: Chạy Maven Build (Test & Package)
      run: mvn clean package

    - name: Lưu trữ tệp JAR (Upload Artifact)
      # Bước này chỉ chạy nếu bước build ở trên thành công
      if: success() 
      uses: actions/upload-artifact@v4
      with:
        name: project-executable-jar
        path: target/*.jar